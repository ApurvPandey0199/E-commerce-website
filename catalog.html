<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Apparel Shop Catalog | PR Manufacturing Co.</title>
  <meta name="description" content="Browse our complete collection of custom T-shirts, corporate polo shirts, team hoodies, scrubs, and promotional gifts. Direct factory rates.">
  
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- Dynamic Header -->
  <header id="global-header"></header>

  <main>
    <section class="section-padding" style="background: var(--dark-gradient); color: #FFFFFF; padding: 50px 0;">
      <div class="container text-center">
        <h1 style="font-size: 38px; color: #FFFFFF; margin-bottom: 10px;">PR Apparel Catalog</h1>
        <p style="color: var(--text-light); font-size: 16px;">Direct manufacturing solutions. Custom colors, sizes, and print options at factory rates.</p>
      </div>
    </section>

    <div class="container section-padding">
      <div class="catalog-layout">
        
        <!-- Sidebar Filters -->
        <aside class="filter-sidebar">
          <div class="filter-group">
            <h3>Apparel Categories</h3>
            <span class="filter-option active" data-category="all">All Apparel</span>
            <span class="filter-option" data-category="t-shirts">Corporate T-Shirts</span>
            <span class="filter-option" data-category="polos">Signature Polos</span>
            <span class="filter-option" data-category="hoodies">Team Hoodies</span>
            <span class="filter-option" data-category="uniforms">Uniform Sets</span>
            <span class="filter-option" data-category="jackets">Storm Jackets</span>
            <span class="filter-option" data-category="gifts">Promotional Gifts</span>
          </div>

          <div class="filter-group">
            <h3>Max Price Filter</h3>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
              <span>Max: ₹</span>
              <input type="number" id="price-max-input" class="form-control" placeholder="1500" value="1500" style="padding: 6px 10px;">
            </div>
          </div>
        </aside>

        <!-- Main Product Grid & Controls -->
        <section>
          <div class="catalog-content-header">
            <div style="display: flex; gap: 10px; width: 100%; max-width: 400px;">
              <input type="text" id="catalog-search" class="form-control" placeholder="Search products..." style="padding: 10px 14px;">
            </div>
            
            <div style="display: flex; align-items: center; gap: 10px;">
              <label for="catalog-sort" style="font-size: 14px; font-weight: 600; white-space: nowrap;">Sort By:</label>
              <select id="catalog-sort" class="form-control" style="padding: 8px 12px; width: 180px;">
                <option value="popular">Popularity</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="newest">Newest First</option>
              </select>
            </div>
          </div>

          <!-- Product Grid -->
          <div class="catalog-grid" id="shop-products-grid">
            <!-- Rendered dynamically -->
          </div>
        </section>

      </div>
    </div>
  </main>

  <!-- Dynamic Footer -->
  <footer id="global-footer"></footer>

  <!-- Scripts -->
  <script src="js/db.js"></script>
  <script src="js/shopify.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  
  <script>
    let activeCategory = "all";
    let searchQuery = "";
    let sortMethod = "popular";
    let maxPrice = 1500;
    let debounceTimer = null;

    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const urlCat = params.get("category");
      if (urlCat) {
        activeCategory = urlCat;
        const opt = document.querySelector(`.filter-option[data-category="${urlCat}"]`);
        if (opt) {
          document.querySelectorAll(".filter-option[data-category]").forEach(el => el.classList.remove("active"));
          opt.classList.add("active");
        }
      }

      renderShop();
      setupEvents();
    });

    function setupEvents() {
      document.querySelectorAll(".filter-option[data-category]").forEach(el => {
        el.addEventListener("click", () => {
          document.querySelectorAll(".filter-option[data-category]").forEach(x => x.classList.remove("active"));
          el.classList.add("active");
          activeCategory = el.getAttribute("data-category");
          renderShop();
        });
      });

      document.getElementById("catalog-search").addEventListener("input", (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          searchQuery = e.target.value.toLowerCase().trim();
          renderShop();
        }, 300);
      });

      document.getElementById("price-max-input").addEventListener("input", (e) => {
        maxPrice = parseFloat(e.target.value) || 99999;
        renderShop();
      });

      document.getElementById("catalog-sort").addEventListener("change", (e) => {
        sortMethod = e.target.value;
        renderShop();
      });
    }

    function renderShop() {
      const grid = document.getElementById("shop-products-grid");
      let products = window.PR_DB.getProducts();

      if (activeCategory !== "all") {
        products = products.filter(p => p.category === activeCategory || p.category_id === activeCategory);
      }

      products = products.filter(p => p.basePrice <= maxPrice);

      if (searchQuery) {
        products = products.filter(p => 
          p.name.toLowerCase().includes(searchQuery) || 
          p.description.toLowerCase().includes(searchQuery) ||
          p.fabric.toLowerCase().includes(searchQuery)
        );
      }

      if (sortMethod === "price-asc") {
        products.sort((a, b) => a.basePrice - b.basePrice);
      } else if (sortMethod === "price-desc") {
        products.sort((a, b) => b.basePrice - a.basePrice);
      } else if (sortMethod === "newest") {
        products.sort((a, b) => b.id.localeCompare(a.id));
      } else {
        products.sort((a, b) => b.rating - a.rating);
      }

      if (products.length === 0) {
        grid.innerHTML = `
          <div class="text-center" style="grid-column: 1/-1; padding: 80px 20px;">
            <h3 style="font-size: 20px; margin-bottom: 8px;">No Products Found</h3>
            <p class="text-muted">Try adjusting your filters or search keywords.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = products.map(p => `
        <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'" style="cursor: pointer;">
          <div class="product-img-box">
            <img src="${p.images[0]}" alt="${p.name}">
            <span class="category-badge">${p.category}</span>
          </div>
          <div class="product-info-box">
            <h3>${p.name}</h3>
            <p class="product-tagline">${p.tagline}</p>
            <div class="product-rating-row">
              <span class="star-rating">★</span>
              <strong>${p.rating}</strong>
              <span class="text-muted">(${p.reviews_count || 0})</span>
            </div>
            <div class="product-footer-row">
              <div>
                <span class="product-price-lbl">Starting at</span>
                <div class="product-price-val">₹${p.basePrice}</div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); window.location.href='product.html?id=${p.id}';">
                Buy Now
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
