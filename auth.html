<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Customer Login & Sign Up | PR Manufacturing Co.</title>
  <meta name="description" content="Sign in or register your account to place orders, track custom purchases, and unlock B2B pricing discounts.">
  
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- Dynamic Header -->
  <header id="global-header"></header>

  <main>
    <section class="section-padding" style="background: var(--dark-gradient); color: #FFFFFF; padding: 50px 0;">
      <div class="container text-center">
        <h1 style="font-size: 38px; color: #FFFFFF; margin-bottom: 10px;">Account Access Desk</h1>
        <p style="color: var(--text-light); font-size: 16px;">Log in or register your account to place custom clothing orders and access your order desk.</p>
      </div>
    </section>

    <div class="container section-padding">
      <div style="max-width: 480px; margin: 0 auto; background: var(--bg-white); padding: 35px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); box-shadow: var(--shadow-md);">
        
        <!-- Tab Switcher -->
        <div style="display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
          <button class="btn btn-secondary auth-tab-btn active" id="btn-tab-login" style="flex: 1;">Sign In</button>
          <button class="btn btn-secondary auth-tab-btn" id="btn-tab-register" style="flex: 1;">Create Account</button>
        </div>

        <!-- Login Form -->
        <form id="form-auth-login">
          <div class="form-group">
            <label for="auth-login-email" class="form-label">Email Address</label>
            <input type="email" id="auth-login-email" class="form-control" required placeholder="name@company.com">
          </div>
          
          <div class="form-group">
            <label for="auth-login-pass" class="form-label">Password</label>
            <input type="password" id="auth-login-pass" class="form-control" required placeholder="••••••••">
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In to Account</button>
        </form>

        <!-- Register Form -->
        <form id="form-auth-register" style="display: none;">
          <div class="form-group">
            <label for="auth-reg-name" class="form-label">Full Name / Contact Person</label>
            <input type="text" id="auth-reg-name" class="form-control" required placeholder="John Doe">
          </div>

          <div class="form-group">
            <label for="auth-reg-company" class="form-label">Company / Institute Name</label>
            <input type="text" id="auth-reg-company" class="form-control" placeholder="Acme Inc.">
          </div>

          <div class="form-group">
            <label for="auth-reg-email" class="form-label">Email Address</label>
            <input type="email" id="auth-reg-email" class="form-control" required placeholder="name@company.com">
          </div>
          
          <div class="form-group">
            <label for="auth-reg-pass" class="form-label">Password</label>
            <input type="password" id="auth-reg-pass" class="form-control" required placeholder="Create password">
          </div>

          <div class="form-group">
            <label for="auth-reg-phone" class="form-label">Phone Number</label>
            <input type="tel" id="auth-reg-phone" class="form-control" required placeholder="+91 98765 43210">
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Register Account</button>
        </form>

        <div style="margin: 25px 0 15px; text-align: center; position: relative;">
          <hr style="border: none; height: 1px; background: var(--border-color);">
          <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg-white); padding: 0 12px; font-size: 12px; color: var(--text-muted);">OR</span>
        </div>

        <!-- Google OAuth Simulation -->
        <button type="button" class="btn btn-secondary" id="btn-google-login" style="width: 100%;">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
          Sign in with Google
        </button>

        <!-- Test Accounts Helper -->
        <div style="margin-top: 25px; padding: 15px; background: var(--bg-light); border-radius: var(--radius-sm); border: 1px solid var(--border-color); font-size: 12px; color: var(--text-muted);">
          <strong>Sample Accounts for Testing:</strong>
          <p style="margin-top: 4px;">• <strong>Admin:</strong> <code>admin@prmfg.com</code> / <code>admin123</code></p>
          <p>• <strong>Customer:</strong> <code>corporate@client.com</code> / <code>password</code></p>
        </div>

      </div>
    </div>
  </main>

  <!-- Dynamic Footer -->
  <footer id="global-footer"></footer>

  <!-- Scripts -->
  <script src="js/db.js"></script>
  <script src="js/shopify.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (window.AuthService.isLoggedIn()) {
        const user = window.AuthService.getCurrentUser();
        window.location.href = user.role === "admin" ? "admin.html" : "account.html";
        return;
      }

      setupTabs();
      setupForms();
    });

    function setupTabs() {
      const loginBtn = document.getElementById("btn-tab-login");
      const regBtn = document.getElementById("btn-tab-register");
      const loginForm = document.getElementById("form-auth-login");
      const regForm = document.getElementById("form-auth-register");

      loginBtn.addEventListener("click", () => {
        loginBtn.classList.add("active");
        regBtn.classList.remove("active");
        loginForm.style.display = "block";
        regForm.style.display = "none";
      });

      regBtn.addEventListener("click", () => {
        regBtn.classList.add("active");
        loginBtn.classList.remove("active");
        regForm.style.display = "block";
        loginForm.style.display = "none";
      });
    }

    function setupForms() {
      // Login submit
      document.getElementById("form-auth-login").addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("auth-login-email").value.trim();
        const pass = document.getElementById("auth-login-pass").value;

        const res = window.AuthService.login(email, pass);
        if (res.success) {
          showNotification("Login successful! Redirecting...");
          setTimeout(() => {
            window.location.href = res.user.role === "admin" ? "admin.html" : "account.html";
          }, 800);
        } else {
          showNotification(res.error, "error");
        }
      });

      // Register submit
      document.getElementById("form-auth-register").addEventListener("submit", (e) => {
        e.preventDefault();
        const name = document.getElementById("auth-reg-name").value.trim();
        const company = document.getElementById("auth-reg-company").value.trim();
        const email = document.getElementById("auth-reg-email").value.trim();
        const pass = document.getElementById("auth-reg-pass").value;
        const phone = document.getElementById("auth-reg-phone").value.trim();

        const res = window.AuthService.register({
          email,
          password: pass,
          contactPerson: name,
          companyName: company || name,
          phone
        });

        if (res.success) {
          showNotification("Account created! Redirecting...");
          setTimeout(() => {
            window.location.href = res.user.role === "admin" ? "admin.html" : "account.html";
          }, 800);
        } else {
          showNotification(res.error, "error");
        }
      });

      // Google OAuth simulated
      document.getElementById("btn-google-login").addEventListener("click", () => {
        const res = window.AuthService.googleLoginSimulated();
        showNotification("Signed in via Google! Redirecting...");
        setTimeout(() => {
          window.location.href = "account.html";
        }, 800);
      });
    }

    function showNotification(msg, type = "success") {
      const container = document.createElement("div");
      container.className = `toast-notification ${type}`;
      container.innerHTML = `<span>${msg}</span>`;
      document.body.appendChild(container);
      setTimeout(() => container.classList.add("show"), 100);
      setTimeout(() => {
        container.classList.remove("show");
        setTimeout(() => container.remove(), 300);
      }, 3500);
    }
  </script>
</body>
</html>
