<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Category Products | PR Manufacturing Co.</title>
  <meta name="description" content="Explore custom apparel within this category. Direct factory manufacturing rates and customization options.">
  
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <!-- Dynamic Header -->
  <header id="global-header"></header>

  <main>
    <section class="section-padding" style="background: var(--dark-gradient); color: #FFFFFF; padding: 50px 0;">
      <div class="container text-center">
        <span class="showcase-badge" style="background: var(--accent); color: #FFFFFF;" id="cat-badge-lbl">Category</span>
        <h1 style="font-size: 38px; color: #FFFFFF; margin-top: 10px; margin-bottom: 10px;" id="cat-title-lbl">Category Products</h1>
        <p style="color: var(--text-light); font-size: 16px; max-width: 600px; margin: 0 auto;" id="cat-desc-lbl">Explore custom garments crafted with industrial precision.</p>
      </div>
    </section>

    <div class="container section-padding">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <a href="shop.html" class="btn btn-secondary btn-sm">&larr; Back to All Categories</a>
        <span style="font-weight: 600; font-size: 14px;" id="cat-count-lbl">0 Products Available</span>
      </div>

      <div class="catalog-grid" id="category-products-grid">
        <!-- Rendered dynamically -->
      </div>
    </div>
  </main>

  <!-- Dynamic Footer -->
  <footer id="global-footer"></footer>

  <!-- Scripts -->
  <script src="js/db.js"></script>
  <script src="js/shopify.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug") || "t-shirts";
      
      const category = window.PR_DB.getCategoryBySlug(slug);
      const products = window.PR_DB.getProducts().filter(p => p.category === slug || p.category_id === slug || (category && p.category_id === category.id));

      if (category) {
        document.title = `${category.name} - Direct Factory Apparel | PR Manufacturing Co.`;
        document.getElementById("cat-title-lbl").textContent = category.name;
        document.getElementById("cat-desc-lbl").textContent = category.description;
        document.getElementById("cat-badge-lbl").textContent = category.name.toUpperCase();
      } else {
        document.getElementById("cat-title-lbl").textContent = slug.toUpperCase();
      }

      document.getElementById("cat-count-lbl").textContent = `${products.length} Products Available`;

      const grid = document.getElementById("category-products-grid");
      if (products.length === 0) {
        grid.innerHTML = `
          <div class="text-center" style="grid-column: 1/-1; padding: 80px 20px;">
            <h3 style="font-size: 20px; margin-bottom: 8px;">No Products in this Category</h3>
            <p class="text-muted">Browse our full shop for all available custom apparel lines.</p>
            <a href="shop.html" class="btn btn-primary" style="margin-top: 15px;">Browse Shop</a>
          </div>
        `;
        return;
      }

      grid.innerHTML = products.map(p => `
        <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'" style="cursor: pointer;">
          <div class="product-img-box">
            <img src="${p.images[0]}" alt="${p.name}">
            <span class="category-badge">${p.category}</span>
          </div>
          <div class="product-info-box">
            <h3>${p.name}</h3>
            <p class="product-tagline">${p.tagline}</p>
            <div class="product-rating-row">
              <span class="star-rating">★</span>
              <strong>${p.rating}</strong>
              <span class="text-muted">(${p.reviews_count || 0})</span>
            </div>
            <div class="product-footer-row">
              <div>
                <span class="product-price-lbl">Starting at</span>
                <div class="product-price-val">₹${p.basePrice}</div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); window.location.href='product.html?id=${p.id}';">
                Buy Now
              </button>
            </div>
          </div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
